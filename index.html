<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confeitos - Sabor Caseiro & Tradição</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1a1a1a;
            /* Cor extraída exatamente do fundo da sua logo */
            --banner-bege: #f2eee3; 
            --accent-orange: #d48b49;
            --text-dark-brown: #413529;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { background-color: var(--bg-dark); color: white; padding: 15px; }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5px 25px 5px;
        }
        .logo { font-weight: 700; color: var(--accent-orange); font-size: 1.4rem; }
        
        .btn-whatsapp {
            background: var(--accent-orange);
            color: white;
            padding: 10px 22px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* Banner Principal */
        .hero {
            background-color: var(--banner-bege);
            border-radius: 35px;
            padding: 45px 20px; 
            color: var(--text-dark-brown);
            text-align: center;
            margin-bottom: 40px;
            max-width: 100%;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        
        .hero span { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; font-weight: 700; opacity: 0.7; }
        .hero h1 { font-size: 1.8rem; margin: 15px 0; line-height: 1.2; font-weight: 700; }
        .hero h1 span { color: var(--accent-orange); }
        
        .hero p { font-size: 0.9rem; line-height: 1.5; margin-bottom: 25px; font-weight: 400; }

        /* Imagem Logo.png */
        .hero .main-img { 
            width: 100%;
            max-width: 260px; 
            margin: 0 auto;
            display: block;
            /* Removido o mix-blend-mode para evitar variações de tom */
        }

        /* Seção Inferior */
        .content-section { margin-top: 30px; padding: 0 5px; }
        .section-title { font-size: 1.3rem; color: white; margin-bottom: 20px; font-weight: 600; }
        
        .coming-soon-box {
            background: #252525;
            border: 1px dashed #555;
            border-radius: 20px;
            padding: 50px 20px;
            text-align: center;
            color: #999;
        }
        .coming-soon-box p { font-style: italic; font-size: 1rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Confeitos</div>
        <a href="https://wa.me/5538991240112" target="_blank" class="btn-whatsapp">Contato</a>
    </header>

    <section class="hero">
        <span>SOBREMESAS</span>
        <h1>Bolos Caseiros com<br><span>Sabores Deliciosos</span></h1>
        
        <p>Sabor caseiro e tradição em cada pedaço, feitos com ingredientes selecionados para você.</p>
        
        <img src="Logo.png" alt="Confeitos Logo" class="main-img">
    </section>

    <div class="content-section">
        <h2 class="section-title">Destaques da Semana</h2>
        
        <div class="coming-soon-box">
            <p>Novidade em breve...</p>
        </div>
    </div>

</body>
</html>
