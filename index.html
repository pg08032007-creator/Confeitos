<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confeitos - Sabor Caseiro & Tradição</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1a1a1a;
            --logo-beige: #f3eee3; /* Cor extraída do fundo da imagem 16489.png */
            --accent-orange: #d48b49;
            --text-dark: #4a3f35;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { background-color: var(--bg-dark); color: white; padding: 15px; }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 20px 0;
        }
        .logo { font-weight: 700; color: var(--accent-orange); font-size: 1.3rem; }
        .btn-whatsapp {
            background: var(--accent-orange);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* Hero Section - Compactada e com cor ajustada */
        .hero {
            background-color: var(--logo-beige);
            border-radius: 25px;
            padding: 20px;
            color: var(--text-dark);
            text-align: center;
            margin-bottom: 30px;
            /* Diminuindo o tamanho da 'embed' */
            max-width: 95%;
            margin-left: auto;
            margin-right: auto;
        }
        .hero span { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 700; opacity: 0.7; }
        .hero h1 { font-size: 1.5rem; margin: 10px 0; line-height: 1.2; font-weight: 700; }
        .hero h1 span { color: var(--accent-orange); font-size: 1.5rem; }
        
        .hero .main-img { 
            width: 70%; 
            max-width: 180px; 
            margin: 10px 0;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        .hero p { font-size: 0.8rem; line-height: 1.4; margin-top: 10px; }

        /* Seção de Conteúdo */
        .content-section { margin-top: 20px; }
        .section-title { font-size: 1.2rem; color: white; margin-bottom: 10px; }
        
        .coming-soon-box {
            background: #252525;
            border: 1px dashed #444;
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            color: #888;
        }
        .coming-soon-box p { font-style: italic; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Confeitos</div>
        <!-- Link configurado para o seu número -->
        <a href="https://wa.me/5538991240112" target="_blank" class="btn-whatsapp">Contato</a>
    </header>

    <section class="hero">
        <span>SOBREMESAS</span>
        <h1>Bolos Caseiros com <span>Sabores Deliciosos</span></h1>
        
        <!-- Imagem centralizada e menor -->
        <img src="16489.png" alt="Confeitos Logo" class="main-img">
        
        <p>Sabor caseiro e tradição em cada pedaço, feitos com ingredientes selecionados para você.</p>
    </section>

    <div class="content-section">
        <h2 class="section-title">Destaques da Semana</h2>
        
        <div class="coming-soon-box">
            <p>Novidade em breve...</p>
        </div>
    </div>

</body>
</html>
