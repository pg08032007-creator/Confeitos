<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confeitos - Doceria</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #fff5f7;
    }

    header {
      background: #ff4d6d;
      color: white;
      text-align: center;
      padding: 20px;
    }

    header img {
      width: 120px;
      border-radius: 50%;
      margin-bottom: 10px;
    }

    header h1 {
      margin: 0;
      font-size: 32px;
    }

    .menu {
      text-align: center;
      margin-top: 50px;
    }

    .btn {
      display: block;
      width: 80%;
      max-width: 320px;
      margin: 15px auto;
      padding: 18px;
      background: #ff4d6d;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 20px;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      transition: 0.2s;
    }

    .btn:hover {
      transform: scale(1.05);
      background: #e63956;
    }

    .container {
      display: none;
      padding: 20px;
    }

    h2 {
      color: #ff4d6d;
      text-align: center;
      margin-top: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
    }

    .card h3 {
      margin: 10px;
      font-size: 18px;
      text-align: center;
    }

    .back {
      display: block;
      margin: 10px auto;
      padding: 10px 20px;
      background: #333;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  <img src="Logo.png" alt="Logo Confeitos">
  <h1>Confeitos</h1>
  <p>Sabor caseiro & tradição</p>
</header>

<!-- MENU INICIAL -->
<div class="menu" id="menu">
  <button class="btn" onclick="mostrar('pronto')">🍰 Pronto Entrega</button>
  <button class="btn" onclick="mostrar('encomenda')">🎂 Encomendas</button>
</div>

<!-- PRONTO ENTREGA -->
<div class="container" id="pronto">
  <button class="back" onclick="voltar()">⬅ Voltar</button>
  <h2>Pronto Entrega</h2>

  <div class="grid">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1606313564200-e75d5e30476c">
      <h3>Bolo no Pote</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1587241321921-91a834d6d191">
      <h3>Pudim</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1625944231382-9c84c6d77c9d">
      <h3>Mousse (Maracujá e Limão)</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1612197521586-7e64c7d3b9e7">
      <h3>Doce de Leite</h3>
    </div>
  </div>
</div>

<!-- ENCOMENDAS -->
<div class="container" id="encomenda">
  <button class="back" onclick="voltar()">⬅ Voltar</button>
  <h2>Encomendas</h2>

  <div class="grid">
    <div class="card">
      <img src="https://images.unsplash.com/photo-1599785209707-28c1c4c6d62b">
      <h3>Bolo de Aniversário</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1589308078059-be1415eab4c3">
      <h3>Brigadeiro</h3>
    </div>

    <div class="card">
      <img src="https://images.unsplash.com/photo-1621939514649-280e2ee25f60">
      <h3>Beijinho</h3>
    </div>
  </div>
</div>

<script>
  function mostrar(tipo) {
    document.getElementById('menu').style.display = 'none';
    document.getElementById(tipo).style.display = 'block';
  }

  function voltar() {
    document.getElementById('menu').style.display = 'block';
    document.getElementById('pronto').style.display = 'none';
    document.getElementById('encomenda').style.display = 'none';
  }
</script>

</body>
</html>
