<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confeitos - Sabor Caseiro & Tradição</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #1a1a1a;
            --banner-bg: #f8f5f0; 
            --accent-orange: #d48b49;
            --text-on-banner: #5a4a3a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body { background-color: var(--bg-dark); color: white; padding: 15px; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 5px 25px 5px;
        }
        .logo { font-weight: 700; color: var(--accent-orange); font-size: 1.4rem; }
        .btn-whatsapp {
            background: var(--accent-orange);
            color: white;
            padding: 10px 22px;
            border-radius: 25px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* Banner (Hero) Ampliado */
        .hero {
            background-color: var(--banner-bg);
            border-radius: 30px;
            /* Aumentado o padding para dar mais corpo ao banner */
            padding: 50px 25px; 
            color: var(--text-on-banner);
            text-align: center;
            margin-bottom: 40px;
            max-width: 100%;
            margin-left: auto;
            margin-right: auto;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        
        .hero span { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 3px; font-weight: 700; opacity: 0.8; }
        .hero h1 { font-size: 1.9rem; margin: 20px 0; line-height: 1.1; font-weight: 700; }
        .hero h1 span { color: var(--accent-orange); }
        
        /* Imagem da Logo em destaque maior */
        .hero .main-img { 
            width: 95%; 
            max-width: 300px; 
            margin: 25px 0;
            display: block;
            margin-left: auto;
            margin-right: auto;
            mix-blend-mode: multiply; 
        }
        
        .hero p { font-size: 1rem; line-height: 1.5; margin-top: 20px; font-weight: 400; }

        /* Seções Inferiores */
        .content-section { margin-top: 30px; padding: 0 5px; }
        .section-title { font-size: 1.3rem; color: white; margin-bottom: 20px; font-weight: 600; }
        
        .coming-soon-box {
            background: #252525;
            border: 1px dashed #555;
            border-radius: 20px;
            padding: 50px 20px;
            text-align: center;
            color: #999;
        }
        .coming-soon-box p { font-style: italic; font-size: 1rem; }
    </style>
</head>
<body>

    <header>
        <div class="logo">Confeitos</div>
        <a href="https://wa.me/5538991240112" target="_blank" class="btn-whatsapp">Contato</a>
    </header>

    <section class="hero">
        <span>SOBREMESAS</span>
        <h1>Bolos Caseiros com<br><span>Sabores Deliciosos</span></h1>
        
        <img src="Logo.png" alt="Confeitos Logo" class="main-img">
        
        <p>Sabor caseiro e tradição em cada pedaço, feitos com ingredientes selecionados para você.</p>
    </section>

    <div class="content-section">
        <h2 class="section-title">Destaques da Semana</h2>
        
        <div class="coming-soon-box">
            <p>Novidade em breve...</p>
        </div>
    </div>

</body>
</html>
